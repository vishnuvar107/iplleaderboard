    /* ══════════════════════════════════════════════════

   :root {
  --bg: #05010a;
  --bg-2: #0a0215;

  --text: #f5f5f5;
  --text-dim: #a1a1aa;

  --neon-blue: #00f0ff;
  --neon-pink: #ff00c8;
  --neon-green: #39ff14;
  --neon-purple: #8b5cf6;
  --primary: #00f0ff;   /* neon blue */
--accent: #ff00c8;    /* neon pink */
--highlight: #facc15; /* yellow/gold */

--text-main: #f9fafb;
--text-soft: #9ca3af;
--text-dim: #6b7280;

  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);

  --gold: #ffd700;
  --ink: #e5e7eb;
--ink-2: #cbd5f5;
--ink-3: #9ca3af;

--rule: rgba(255,255,255,0.1);
--rule-2: rgba(255,255,255,0.05);

--dust: #6b7280;

--turquoise: #00f0ff;

--medal-1: #ffd700;
--medal-2: #c0c0c0;
--medal-3: #cd7f32;
}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

  body {
  background: radial-gradient(circle at 20% 20%, #0a0215, #05010a);
  color: var(--text);

}

    /* ── Page chrome ── */
    .page-wrap {
  max-width: 1100px;
  margin: 0 auto;   /* ✅ centers everything */
  padding: 0 16px 60px;
}

    /* ── Top rule ── */
    .top-rule {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 0 0;
      margin-bottom: 56px;
      border-top: 3px solid var(--ink);
    }
    .top-rule-label {
      font-family: var(--ff-mono);
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--dust);
      white-space: nowrap;
    }
    .top-rule-line { flex: 1; height: 1px; background: var(--rule); }
    .top-rule-season {
      font-family: var(--ff-mono);
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--dust);
    }

    /* ── Masthead ── */
    .masthead {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 32px;
      margin-bottom: 8px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .masthead-left { }
    .kicker {
  font-size: 0.75rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--turquoise);
  opacity: 0.8;
  transform: translateX(20px);
}
.subtext {
  font-size: 0.95rem;
  color: var(--ink-3);
  letter-spacing: 0.05em;
  opacity: 0.75;
  transform: translateX(-10px);
  margin-top: 12px;
  font-style: italic;
}
    .kicker::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 2px;
      background: var(--turquoise);
    }
h1 {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(4rem, 8vw, 7rem);
  font-weight: 900;

  color: white;   /* solid color */

  letter-spacing: -2px;
  line-height: 0.9;

  transform: skewX(-8deg);  /* KEY effect */
}
    .masthead-deck {
      margin-top: 14px;
      font-size: .95rem;
      font-style: italic;
      color: var(--dust);
      font-weight: 300;
    }
    .masthead-stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      padding-bottom: 4px;
    }
    .mstat {
      font-family: var(--ff-mono);
      font-size: .62rem;
      letter-spacing: .1em;
      color: var(--dust);
    }
    .mstat strong {
      font-family: var(--ff-display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.02em;
      display: block;
      line-height: 1;
    }

    /* ── Section head ── */
    .sec-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 52px 0 20px;

  .sec-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 1.2rem;

  letter-spacing: 0.2em;
  color: white;

  transform: skewX(-6deg);
}
.sec-title::before {
    content: "";
  position: absolute;
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, #ff00c8, transparent);
  top: -10px;
}
.sec-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--neon-pink), transparent);
}

    .sec-rule { flex: 1; height: 1px; background: var(--rule); }
    .sec-count {
      font-family: var(--ff-mono);
      font-size: .6rem;
      letter-spacing: .1em;
      color: var(--dust);
      white-space: nowrap;
    }

    /* ══════════════════════════════════════════════════
       MAIN LEADERBOARD TABLE
    ══════════════════════════════════════════════════ */
   /* Leaderboard wrapper */
.lb-wrap {
  background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  box-shadow: none;
}

/* Match cards */
.match-card {
background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  box-shadow: 0 0 40px rgba(0,255,255,0.05);
}

.lb-table {
  width: 100%;
  min-width: 680px;   /* ✅ key for mobile */
  border-collapse: collapse;
}

  .lb-table thead tr {
  background: linear-gradient(90deg, #0f172a, #020617);
}

.lb-table th {
  font-family: 'Alegreya Sans', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  white-space: nowrap;
  color: var(--accent);
}

    /* Header row */
    
    
    .lb-table th.r { text-align: right; }
    .lb-table th.c { text-align: center; }

    /* Body rows */
    .lb-table tbody tr {
  transition: all 0.3s ease;
}

.lb-table tbody tr:hover {
background: rgba(255,255,255,0.05);
  transform: none;
}
    .lb-table tbody tr:last-child { border-bottom: none; }

    .lb-table td {
  padding: 16px 14px;
  font-size: 0.95rem;
  color: var(--text-soft);
}
    .lb-table td.r {
  text-align: right;
  font-family: var(--ff-mono);
  font-size: .95rem; /* bigger */
  letter-spacing: 0.04em;
  color: var(--text-dim);
}
    .lb-table td.c { text-align: center; }

    /* Rank cell */
    .lb-rank {
      font-family: var(--ff-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--rule);
      width: 40px;
      display: inline-block;
      text-align: center;
    }
    tr.top-1 .lb-rank { color: var(--medal-1); }
    tr.top-2 .lb-rank { color: var(--medal-2); }

    /* Top-3 left accent */

    tr.top-2 td:first-child { border-left: 3px solid var(--medal-2); }
    tr.top-3 td:first-child { border-left: 3px solid var(--medal-3); }

    /* Top-3 row tint */
tr.top-1 {

}

tr.top-2 {
  background: linear-gradient(90deg, rgba(0,240,255,0.2), transparent);
}

tr.top-3 {
  background: linear-gradient(90deg, rgba(255,0,200,0.2), transparent);
}

    /* Player cell */
    .lb-player {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .lb-avatar {

      height: 34px;

    /* Points highlight */
 .lb-pts {
  font-size: 1.4rem;

}
    tr.top-1 .lb-pts { color: var(--medal-1); }
    tr.top-2 .lb-pts { color: var(--medal-2); }
    tr.top-3 .lb-pts { color: var(--medal-3); }

    /* Win rate pill */
   .wr-pill {
  font-size: 0.75rem;

  border-radius: 6px;
  letter-spacing: 0.08em;

  border: 1px solid rgba(255,255,255,0.08);
}


/* High */
.wr-hi {
  background: linear-gradient(135deg, #22c55e, #4ade80);

  text-shadow: 0 0 8px rgba(74,222,128,.6);
}

/* Medium */
.wr-mid {
  background: linear-gradient(135deg, #facc15, #fbbf24);

  text-shadow: 0 0 8px rgba(250,204,21,.6);
}

/* Low */
.wr-lo {
  background: linear-gradient(135deg, #ef4444, #f87171);

  text-shadow: 0 0 8px rgba(248,113,113,.6);
}

    /* Summary footer */
    .lb-footer {
  display: flex;
  flex-wrap: wrap;   /* ✅ important */
  width: 100%;
  border-radius: 0 0 12px 12px;

  background: linear-gradient(
    135deg,

    .lb-fstat-val {

    @keyframes fadeSlide {

      <div class="mstat"><strong id="hd-matches">—</strong>Matches</div>
    </div>
  </div>
  <div class="hero-player" id="top-player"></div>
  <div class="floating-box left-box"></div>
<div class="floating-box right-box"></div>

  <!-- ═══════════════ MAIN LEADERBOARD ═══════════════ -->
  <div class="sec-head" style="margin-top:36px">
    <span class="sec-title">Overall Rankings</span>
    <span class="sec-rule"></span>
    <span class="sec-count" id="lb-count">—</span>
  </div>

  <div class="lb-wrap">
    <table class="lb-table">
      <thead>
        <tr>
          <th style="width:52px">#</th>
          <th>Player</th>
          <th class="r">Played</th>
          <th class="r">Wins</th>
          <th class="r">Total Points</th>
          <th class="r">Win Rate</th>
          <th class="r">Avg Score</th>
        </tr>
      </thead>
      <tbody id="lb-body"></tbody>
    </table>
    <div class="lb-footer" id="lb-footer"></div>
  </div>
 <div class="big-text" style="top: 80px; left: -20px; color: rgba(0,255,255,0.05);">
  ABUSERS
</div>

<div class="big-text" style="bottom: 100px; right: -40px; color: rgba(255,0,200,0.05);">
  11
</div>
  <!-- ═══════════════ MATCH HISTORY ═══════════════ -->
  <div class="sec-head">
    <span class="sec-title">Match History</span>
    <span class="sec-rule"></span>
    <span class="sec-count" id="match-count">—</span>
  </div>

  <div class="matches-grid" id="matches-grid"></div>

  <!-- Footer -->
  <div class="page-footer">
    <span class="pf-left" id="footer-updated">—</span>
    <span class="pf-right">Edit data.js · Reload to update</span>
  </div>

</div><!-- .page-wrap -->

<!-- Load the data file first -->
<script src="data.js"></script>

<script>
/* ═══════════════════════════════════════════════════════
   PURE CALCULATION ENGINE
   No APIs, no storage, no forms.
   Reads PLAYERS + MATCHES from data.js, computes everything.
═══════════════════════════════════════════════════════ */

// ── Avatar colour palette (stable hash per name) ──────────
const PALETTE = [
  ["#3b2a1a","#d4a832"],["#0f2a1a","#2d9e6b"],["#1a0f2a","#8b6dd4"],
  ["#2a0f0f","#d44b3b"],["#0f1f2a","#3b8fd4"],["#1a2a0f","#6dbb3b"],
  ["#2a1a0f","#d47a3b"],["#0f2a2a","#3bd4c8"],["#1a0f1a","#c83bd4"],
  ["#0a1a10","#1da86b"],["#1a1a0f","#b8a828"],["#2a0f1a","#d43b8b"],
];
function palFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}

// ── Helpers ───────────────────────────────────────────────
const ini   = n => n.trim().split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
const medal = r => {
  if (r === 1) return `<span class="medal gold"></span>`;
  if (r === 2) return `<span class="medal silver"></span>`;
  if (r === 3) return `<span class="medal bronze"></span>`;
  return r;
};
const fmtDate = iso => {
  try { return new Date(iso + "T00:00:00").toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" }); }
  catch { return iso; }
};
// Smart number formatter: no trailing zeros, locale commas
function fmtNum(n) {
  if (typeof n !== "number" || isNaN(n)) return "—";
  const r = Math.round(n * 10000) / 10000;
  if (Number.isInteger(r)) return r.toLocaleString();
  // show up to 2 decimal places, strip trailing zeros
  return parseFloat(r.toFixed(2)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}
const wrClass = wr => wr >= 65 ? "wr-hi" : wr >= 35 ? "wr-mid" : "wr-lo";

function avEl(name, size = 34, fs = ".72rem") {
  const [bg, fg] = palFor(name);
  return `<div class="${size <= 26 ? "mt-avatar" : "lb-avatar"}" style="background:${bg};color:${fg};font-size:${fs}">${ini(name)}</div>`;
}

// ── Aggregate stats from MATCHES ─────────────────────────
// Wins: player(s) with max score in each match win that match.
// Ties share the win (each tied player gets win += 1).
function buildStats() {
  // Collect all names (roster + any extras in match data)
  const allNames = new Set(PLAYERS);
  MATCHES.forEach(m => m.results.forEach(r => allNames.add(r.player.trim())));

  const stats = {};
  allNames.forEach(name => { stats[name] = { name, played: 0, wins: 0, points: 0 }; });

  MATCHES.forEach(match => {
    const res = match.results;
    if (!res || !res.length) return;

    // Determine winner(s) for this match
    const maxScore = Math.max(...res.map(r => parseFloat(r.score) || 0));

    res.forEach(r => {
      const name  = r.player.trim();
      const score = parseFloat(r.score);
      if (!stats[name] || isNaN(score)) return;

      stats[name].played++;
      // Float-safe addition
      stats[name].points = Math.round((stats[name].points + score) * 100000) / 100000;
      if (score === maxScore) stats[name].wins++;
    });
  });

  return Object.values(stats)
    .map(p => ({
      ...p,
      winRate:  p.played ? Math.round(p.wins  / p.played * 10000) / 100 : 0,
      avgScore: p.played ? Math.round(p.points / p.played * 10000) / 10000 : 0,
    }))
    .sort((a, b) => b.points - a.points || b.winRate - a.winRate);
  
}


/* ═══════════════════════════════════════════════════════
   RENDER — MAIN LEADERBOARD
═══════════════════════════════════════════════════════ */
function renderLeaderboard(data) {
  const tbody = document.getElementById("lb-body");
  tbody.innerHTML = "";
  const top = data[0];

document.getElementById("top-player").innerHTML =
  top
    ? `<span class="hero-dot"></span> ${top.name.toUpperCase()} — ${top.points.toFixed(1)} PTS`
    : "";

  data.forEach((p, idx) => {
    const rank = idx + 1;
    const tr   = document.createElement("tr");
    if (rank === 1) tr.classList.add("top-1");
    if (rank === 2) tr.classList.add("top-2");
    if (rank === 3) tr.classList.add("top-3");

    tr.innerHTML = `
      <td><span class="lb-rank">${medal(rank) || rank}</span></td>
      <td>
        <div class="lb-player">
          ${avEl(p.name)}
          <span class="lb-name">${p.name}</span>
        </div>
      </td>
      <td class="r">${p.played}</td>
      <td class="r">${p.wins}</td>
      <td class="r"><span class="lb-pts">${fmtNum(p.points)}</span></td>
      <td class="r"><span class="wr-pill">${p.winRate.toFixed(1)}%</span></td>
      <td class="r">${p.avgScore.toFixed(2)}</td>
    `;
    tbody.appendChild(tr);
  });

  // Badge counts
  document.getElementById("lb-count").textContent = `${data.length} ranked`;
  document.getElementById("hd-players").textContent = data.length;
  document.getElementById("hd-matches").textContent = MATCHES.length;

  // Footer summary bar
  const footer   = document.getElementById("lb-footer");
  footer.innerHTML = "";
  const totalPts  = Math.round(data.reduce((s, p) => s + p.points, 0) * 100) / 100;
  const leader    = data[0];
  const bestWR    = data.length ? Math.max(...data.map(p => p.winRate)) : 0;
  const bestWRp   = data.find(p => Math.abs(p.winRate - bestWR) < 0.001);
  const totalGames = data.reduce((s, p) => s + p.played, 0);

  [
    { label: "Total Points",  val: fmtNum(totalPts) },
    { label: "Current Leader",val: leader ? leader.name.split(" ")[0] : "—" },
    { label: "Best Win Rate", val: bestWRp ? `${bestWR.toFixed(1)}%` : "—" },
    { label: "Total Games",   val: totalGames },
    { label: "Matches",       val: MATCHES.length },
  ].forEach(s => {
    const el = document.createElement("div");
    el.className = "lb-fstat";
    el.innerHTML = `<div class="lb-fstat-label">${s.label}</div><div class="lb-fstat-val">${s.val}</div>`;
    footer.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════
   RENDER — MATCH HISTORY
═══════════════════════════════════════════════════════ */
function renderMatches() {
  const grid = document.getElementById("matches-grid");
  grid.innerHTML = "";

  if (!MATCHES.length) {
    grid.innerHTML = `<p style="font-family:var(--ff-mono);font-size:.75rem;color:var(--dust)">No matches in data.js yet.</p>`;
    document.getElementById("match-count").textContent = "0 matches";
    return;
  }

  // Render newest first
  [...MATCHES].reverse().forEach((match, ci) => {
    const sorted = [...match.results]
      .map(r => ({ ...r, score: parseFloat(r.score) || 0 }))
      .sort((a, b) => b.score - a.score);

    const maxScore   = sorted.length ? sorted[0].score : 0;
    const totalScore = Math.round(sorted.reduce((s, r) => s + r.score, 0) * 100) / 100;
    const avgScore   = sorted.length ? Math.round(totalScore / sorted.length * 100) / 100 : 0;

    const rows = sorted.map((r, i) => {
      const mr  = i + 1;
      const cls = mr <= 3 ? `mr-${mr}` : "";
      const isWinner = r.score === maxScore;
      return `
        <tr class="${cls}">
          <td><span class="mt-rank">${medal(mr) || mr}</span></td>
          <td>
            <div class="mt-player">
              ${avEl(r.player, 24, ".6rem")}
              ${r.player}
              ${isWinner ? `<span class="win-badge">WIN</span>` : ""}
            </div>
          </td>
          <td class="r"><span class="mt-score">${fmtNum(r.score)}</span></td>
        </tr>`;
    }).join("");

    const card = document.createElement("div");
    card.className = "match-card";
    card.style.animationDelay = `${ci * 0.05}s`;
    card.innerHTML = `
      <div class="match-head">
        <div class="match-head-left">
          <span class="match-num">${match.id}</span>
          ${sorted[0] ? `<span class="match-winner-chip">🏆 ${sorted[0].player.split(" ")[0]}</span>` : ""}
        </div>
        <span class="match-date">${fmtDate(match.date)}</span>
      </div>
      <table class="match-table">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>Player</th>
            <th class="r">Score</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="match-foot">
        <div class="mf-item"><div class="mf-label">Players</div><div class="mf-val">${sorted.length}</div></div>
        <div class="mf-item"><div class="mf-label">Top Score</div><div class="mf-val">${fmtNum(maxScore)}</div></div>
        <div class="mf-item"><div class="mf-label">Total Pts</div><div class="mf-val">${fmtNum(totalScore)}</div></div>
        <div class="mf-item"><div class="mf-label">Avg Score</div><div class="mf-val">${fmtNum(avgScore)}</div></div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById("match-count").textContent = `${MATCHES.length} matches`;
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
(function init() {
  // Derive date range for season label
  if (MATCHES.length) {
    const dates  = MATCHES.map(m => m.date).sort();
    const first  = fmtDate(dates[0]);
    const last   = fmtDate(dates[dates.length - 1]);
    document.getElementById("season-label").textContent =
      dates.length > 1 ? `${first} – ${last}` : first;
  }

  // Footer timestamp
  document.getElementById("footer-updated").textContent =
    `Last loaded: ${new Date().toLocaleString("en-IN")}`;

  const stats = buildStats();
  renderLeaderboard(stats);
  renderMatches();
})();
</script>
</body>
</html>
