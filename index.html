<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Leaderboard</title>

  <!--
    ┌─────────────────────────────────────────────────────┐
    │  PROJECT STRUCTURE                                   │
    │  leaderboard/                                        │
    │    index.html   ← this file (display only)          │
    │    data.js      ← EDIT THIS to add matches          │
    └─────────────────────────────────────────────────────┘
    Open index.html in any browser. No server needed.
    After editing data.js, just reload the page (F5).
  -->

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&family=Literata:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>

  <style>
    /* ══════════════════════════════════════════════════
       DESIGN DIRECTION:
       Editorial/print — warm cream-and-ink palette,
       strong typographic hierarchy, table-first layout.
       Feels like a beautifully typeset sports magazine.
    ══════════════════════════════════════════════════ */

    :root {
      /* Palette */
      --ink:       #12100e;
      --ink-2:     #2c2926;
      --ink-3:     #4a4540;
      --dust:      #7a7268;
      --rule:      #d4cfc8;
      --rule-2:    #e8e3dc;
      --paper:     #f5f0e8;
      --paper-2:   #faf7f2;
      --cream:     #fff9f0;

      /* Accents */
      --red:       #c0392b;
      --red-dim:   rgba(192,57,43,.08);
      --gold:      #b5860d;
      --gold-dim:  rgba(181,134,13,.10);
      --green:     #1a6b3c;
      --green-dim: rgba(26,107,60,.08);

      /* Medal colours */
      --medal-1: #b5860d;
      --medal-2: #6b7280;
      --medal-3: #8b5e3c;

      /* Type */
      --ff-display: 'Syne', sans-serif;
      --ff-mono:    'Syne Mono', monospace;
      --ff-body:    'Literata', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--ff-body);
      min-height: 100vh;
    }

    /* ── Page chrome ── */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px 120px;
    }

    /* ── Top rule ── */
    .top-rule {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 0 0;
      margin-bottom: 56px;
      border-top: 3px solid var(--ink);
    }
    .top-rule-label {
      font-family: var(--ff-mono);
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--dust);
      white-space: nowrap;
    }
    .top-rule-line { flex: 1; height: 1px; background: var(--rule); }
    .top-rule-season {
      font-family: var(--ff-mono);
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--dust);
    }

    /* ── Masthead ── */
    .masthead {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 32px;
      margin-bottom: 8px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--rule);
    }
    .masthead-left { }
    .kicker {
      font-family: var(--ff-mono);
      font-size: .65rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kicker::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 2px;
      background: var(--red);
    }
    h1 {
      font-family: var(--ff-display);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 800;
      line-height: .95;
      letter-spacing: -.02em;
      color: var(--ink);
    }
    .masthead-deck {
      margin-top: 14px;
      font-size: .95rem;
      font-style: italic;
      color: var(--dust);
      font-weight: 300;
    }
    .masthead-stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      padding-bottom: 4px;
    }
    .mstat {
      font-family: var(--ff-mono);
      font-size: .62rem;
      letter-spacing: .1em;
      color: var(--dust);
    }
    .mstat strong {
      font-family: var(--ff-display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.02em;
      display: block;
      line-height: 1;
    }

    /* ── Section head ── */
    .sec-head {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 52px 0 20px;
    }
    .sec-title {
      font-family: var(--ff-display);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-3);
      white-space: nowrap;
    }
    .sec-rule { flex: 1; height: 1px; background: var(--rule); }
    .sec-count {
      font-family: var(--ff-mono);
      font-size: .6rem;
      letter-spacing: .1em;
      color: var(--dust);
      white-space: nowrap;
    }

    /* ══════════════════════════════════════════════════
       MAIN LEADERBOARD TABLE
    ══════════════════════════════════════════════════ */
    .lb-wrap {
      background: var(--cream);
      border: 1px solid var(--rule);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 0 var(--rule), 0 8px 40px rgba(18,16,14,.06);
    }

    .lb-table {
      width: 100%;
      border-collapse: collapse;
    }

    /* Header row */
    .lb-table thead tr {
      background: var(--ink);
    }
    .lb-table th {
      font-family: var(--ff-mono);
      font-size: .6rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,249,240,.5);
      padding: 14px 20px;
      text-align: left;
      font-weight: 400;
      white-space: nowrap;
    }
    .lb-table th.r { text-align: right; }
    .lb-table th.c { text-align: center; }

    /* Body rows */
    .lb-table tbody tr {
      border-bottom: 1px solid var(--rule-2);
      transition: background .12s;
    }
    .lb-table tbody tr:last-child { border-bottom: none; }
    .lb-table tbody tr:hover { background: rgba(181,134,13,.04); }

    .lb-table td {
      padding: 15px 20px;
      vertical-align: middle;
    }
    .lb-table td.r {
      text-align: right;
      font-family: var(--ff-mono);
      font-size: .82rem;
      color: var(--ink-3);
    }
    .lb-table td.c { text-align: center; }

    /* Rank cell */
    .lb-rank {
      font-family: var(--ff-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--rule);
      width: 40px;
      display: inline-block;
      text-align: center;
    }
    tr.top-1 .lb-rank { color: var(--medal-1); }
    tr.top-2 .lb-rank { color: var(--medal-2); }
    tr.top-3 .lb-rank { color: var(--medal-3); }

    /* Top-3 left accent */
    tr.top-1 td:first-child { border-left: 3px solid var(--medal-1); }
    tr.top-2 td:first-child { border-left: 3px solid var(--medal-2); }
    tr.top-3 td:first-child { border-left: 3px solid var(--medal-3); }

    /* Top-3 row tint */
    tr.top-1 { background: rgba(181,134,13,.04); }
    tr.top-2 { background: rgba(107,114,128,.025); }
    tr.top-3 { background: rgba(139,94,60,.025); }
    tr.top-1:hover { background: rgba(181,134,13,.07) !important; }
    tr.top-2:hover { background: rgba(107,114,128,.05) !important; }
    tr.top-3:hover { background: rgba(139,94,60,.05) !important; }

    /* Player cell */
    .lb-player {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lb-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ff-display);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .02em;
      flex-shrink: 0;
    }
    .lb-name {
      font-family: var(--ff-display);
      font-size: .92rem;
      font-weight: 600;
      color: var(--ink);
    }

    /* Points highlight */
    .lb-pts {
      font-family: var(--ff-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
    }
    tr.top-1 .lb-pts { color: var(--medal-1); }
    tr.top-2 .lb-pts { color: var(--medal-2); }
    tr.top-3 .lb-pts { color: var(--medal-3); }

    /* Win rate pill */
    .wr-pill {
      display: inline-block;
      font-family: var(--ff-mono);
      font-size: .68rem;
      padding: 3px 9px;
      border-radius: 2px;
      font-weight: 400;
    }
    .wr-hi  { background: var(--green-dim); color: var(--green); }
    .wr-mid { background: var(--gold-dim);  color: var(--gold);  }
    .wr-lo  { background: var(--red-dim);   color: var(--red);   }

    /* Summary footer */
    .lb-footer {
      display: flex;
      border-top: 2px solid var(--ink);
      background: var(--ink);
    }
    .lb-fstat {
      flex: 1;
      padding: 16px 20px;
      border-right: 1px solid var(--ink-2);
    }
    .lb-fstat:last-child { border-right: none; }
    .lb-fstat-label {
      font-family: var(--ff-mono);
      font-size: .54rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,249,240,.35);
      margin-bottom: 3px;
    }
    .lb-fstat-val {
      font-family: var(--ff-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: -.01em;
    }

    /* ══════════════════════════════════════════════════
       MATCH HISTORY GRID
    ══════════════════════════════════════════════════ */
    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 24px;
    }

    .match-card {
      background: var(--cream);
      border: 1px solid var(--rule);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 0 var(--rule), 0 4px 20px rgba(18,16,14,.05);
    }

    .match-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--ink-2);
      border-bottom: 1px solid var(--rule);
    }
    .match-head-left { display: flex; align-items: center; gap: 12px; }
    .match-num {
      font-family: var(--ff-display);
      font-size: .88rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: .02em;
    }
    .match-winner-chip {
      font-family: var(--ff-mono);
      font-size: .6rem;
      letter-spacing: .1em;
      padding: 2px 8px;
      background: rgba(181,134,13,.18);
      border: 1px solid rgba(181,134,13,.35);
      color: #d4a832;
      border-radius: 2px;
    }
    .match-date {
      font-family: var(--ff-mono);
      font-size: .6rem;
      color: rgba(255,249,240,.3);
      letter-spacing: .08em;
    }

    /* Match inner table */
    .match-table { width: 100%; border-collapse: collapse; }
    .match-table th {
      font-family: var(--ff-mono);
      font-size: .56rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dust);
      padding: 9px 14px;
      text-align: left;
      background: var(--paper-2);
      border-bottom: 1px solid var(--rule-2);
    }
    .match-table th.r { text-align: right; }
    .match-table tbody tr { border-bottom: 1px solid var(--rule-2); transition: background .1s; }
    .match-table tbody tr:last-child { border-bottom: none; }
    .match-table tbody tr:hover { background: var(--paper-2); }
    .match-table td { padding: 9px 14px; font-size: .82rem; vertical-align: middle; }
    .match-table td.r { text-align: right; font-family: var(--ff-mono); font-size: .78rem; color: var(--ink-3); }

    .mt-rank {
      font-family: var(--ff-mono);
      font-size: .7rem;
      color: var(--rule);
      width: 22px;
      display: inline-block;
      text-align: center;
    }
    tr.mr-1 .mt-rank { color: var(--medal-1); }
    tr.mr-2 .mt-rank { color: var(--medal-2); }
    tr.mr-3 .mt-rank { color: var(--medal-3); }

    tr.mr-1 td:first-child { border-left: 2px solid var(--medal-1); }
    tr.mr-2 td:first-child { border-left: 2px solid var(--medal-2); }
    tr.mr-3 td:first-child { border-left: 2px solid var(--medal-3); }

    .mt-player {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--ff-display);
      font-size: .82rem;
      font-weight: 500;
      color: var(--ink);
    }
    .mt-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 700;
      font-family: var(--ff-display);
      flex-shrink: 0;
    }

    .mt-score {
      font-family: var(--ff-display);
      font-size: .92rem;
      font-weight: 700;
      color: var(--ink);
    }
    tr.mr-1 .mt-score { color: var(--medal-1); }

    .win-badge {
      display: inline-block;
      font-family: var(--ff-mono);
      font-size: .54rem;
      letter-spacing: .08em;
      padding: 1px 6px;
      border-radius: 2px;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(181,134,13,.2);
    }

    /* Match footer */
    .match-foot {
      display: flex;
      background: var(--paper-2);
      border-top: 1px solid var(--rule);
    }
    .mf-item {
      flex: 1;
      padding: 9px 14px;
      border-right: 1px solid var(--rule-2);
    }
    .mf-item:last-child { border-right: none; }
    .mf-label {
      font-family: var(--ff-mono);
      font-size: .52rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dust);
      margin-bottom: 2px;
    }
    .mf-val {
      font-family: var(--ff-display);
      font-size: .95rem;
      font-weight: 700;
      color: var(--ink-2);
    }

    /* ── Footer ── */
    .page-footer {
      margin-top: 80px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pf-left {
      font-family: var(--ff-mono);
      font-size: .6rem;
      letter-spacing: .12em;
      color: var(--dust);
    }
    .pf-right {
      font-family: var(--ff-mono);
      font-size: .58rem;
      color: var(--rule);
      letter-spacing: .08em;
    }

    /* ── Animations ── */
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lb-wrap     { animation: fadeSlide .5s ease both; }
    .match-card  { animation: fadeSlide .4s ease both; }
    .lb-table tbody tr { animation: fadeSlide .35s ease both; }
    .lb-table tbody tr:nth-child(1)  { animation-delay: .04s }
    .lb-table tbody tr:nth-child(2)  { animation-delay: .08s }
    .lb-table tbody tr:nth-child(3)  { animation-delay: .12s }
    .lb-table tbody tr:nth-child(4)  { animation-delay: .16s }
    .lb-table tbody tr:nth-child(5)  { animation-delay: .20s }
    .lb-table tbody tr:nth-child(6)  { animation-delay: .24s }
    .lb-table tbody tr:nth-child(7)  { animation-delay: .28s }
    .lb-table tbody tr:nth-child(8)  { animation-delay: .32s }
    .lb-table tbody tr:nth-child(9)  { animation-delay: .36s }
    .lb-table tbody tr:nth-child(10) { animation-delay: .40s }
    .match-card:nth-child(1)  { animation-delay: .06s }
    .match-card:nth-child(2)  { animation-delay: .10s }
    .match-card:nth-child(3)  { animation-delay: .14s }
    .match-card:nth-child(4)  { animation-delay: .18s }
    .match-card:nth-child(5)  { animation-delay: .22s }
    .match-card:nth-child(6)  { animation-delay: .26s }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .page-wrap { padding: 0 16px 80px; }
      .masthead { grid-template-columns: 1fr; }
      .masthead-stats { flex-direction: row; align-items: flex-start; }
      .matches-grid { grid-template-columns: 1fr; }
      .lb-table th:nth-child(3),
      .lb-table td:nth-child(3) { display: none; } /* hide Played on mobile */
    }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- Top rule -->
  <div class="top-rule">
    <span class="top-rule-label">Game League</span>
    <span class="top-rule-line"></span>
    <span class="top-rule-season" id="season-label">—</span>
  </div>

  <!-- Masthead -->
  <div class="masthead">
    <div class="masthead-left">
      <div class="kicker">Season Standings</div>
      <h1>Leaderboard</h1>
      <p class="masthead-deck">All statistics calculated from match results · Sorted by total points</p>
    </div>
    <div class="masthead-stats">
      <div class="mstat"><strong id="hd-players">—</strong>Players</div>
      <div class="mstat"><strong id="hd-matches">—</strong>Matches</div>
    </div>
  </div>

  <!-- ═══════════════ MAIN LEADERBOARD ═══════════════ -->
  <div class="sec-head" style="margin-top:36px">
    <span class="sec-title">Overall Rankings</span>
    <span class="sec-rule"></span>
    <span class="sec-count" id="lb-count">—</span>
  </div>

  <div class="lb-wrap">
    <table class="lb-table">
      <thead>
        <tr>
          <th style="width:52px">#</th>
          <th>Player</th>
          <th class="r">Played</th>
          <th class="r">Wins</th>
          <th class="r">Total Points</th>
          <th class="r">Win Rate</th>
          <th class="r">Avg Score</th>
        </tr>
      </thead>
      <tbody id="lb-body"></tbody>
    </table>
    <div class="lb-footer" id="lb-footer"></div>
  </div>

  <!-- ═══════════════ MATCH HISTORY ═══════════════ -->
  <div class="sec-head">
    <span class="sec-title">Match History</span>
    <span class="sec-rule"></span>
    <span class="sec-count" id="match-count">—</span>
  </div>

  <div class="matches-grid" id="matches-grid"></div>

  <!-- Footer -->
  <div class="page-footer">
    <span class="pf-left" id="footer-updated">—</span>
    <span class="pf-right">Edit data.js · Reload to update</span>
  </div>

</div><!-- .page-wrap -->

<!-- Load the data file first -->
<script src="data.js"></script>

<script>
/* ═══════════════════════════════════════════════════════
   PURE CALCULATION ENGINE
   No APIs, no storage, no forms.
   Reads PLAYERS + MATCHES from data.js, computes everything.
═══════════════════════════════════════════════════════ */

// ── Avatar colour palette (stable hash per name) ──────────
const PALETTE = [
  ["#3b2a1a","#d4a832"],["#0f2a1a","#2d9e6b"],["#1a0f2a","#8b6dd4"],
  ["#2a0f0f","#d44b3b"],["#0f1f2a","#3b8fd4"],["#1a2a0f","#6dbb3b"],
  ["#2a1a0f","#d47a3b"],["#0f2a2a","#3bd4c8"],["#1a0f1a","#c83bd4"],
  ["#0a1a10","#1da86b"],["#1a1a0f","#b8a828"],["#2a0f1a","#d43b8b"],
];
function palFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}

// ── Helpers ───────────────────────────────────────────────
const ini   = n => n.trim().split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
const medal = r => ["","🥇","🥈","🥉"][r] || "";
const fmtDate = iso => {
  try { return new Date(iso + "T00:00:00").toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" }); }
  catch { return iso; }
};
// Smart number formatter: no trailing zeros, locale commas
function fmtNum(n) {
  if (typeof n !== "number" || isNaN(n)) return "—";
  const r = Math.round(n * 10000) / 10000;
  if (Number.isInteger(r)) return r.toLocaleString();
  // show up to 2 decimal places, strip trailing zeros
  return parseFloat(r.toFixed(2)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}
const wrClass = wr => wr >= 65 ? "wr-hi" : wr >= 35 ? "wr-mid" : "wr-lo";

function avEl(name, size = 34, fs = ".72rem") {
  const [bg, fg] = palFor(name);
  return `<div class="${size <= 26 ? "mt-avatar" : "lb-avatar"}" style="background:${bg};color:${fg};font-size:${fs}">${ini(name)}</div>`;
}

// ── Aggregate stats from MATCHES ─────────────────────────
// Wins: player(s) with max score in each match win that match.
// Ties share the win (each tied player gets win += 1).
function buildStats() {
  // Collect all names (roster + any extras in match data)
  const allNames = new Set(PLAYERS);
  MATCHES.forEach(m => m.results.forEach(r => allNames.add(r.player.trim())));

  const stats = {};
  allNames.forEach(name => { stats[name] = { name, played: 0, wins: 0, points: 0 }; });

  MATCHES.forEach(match => {
    const res = match.results;
    if (!res || !res.length) return;

    // Determine winner(s) for this match
    const maxScore = Math.max(...res.map(r => parseFloat(r.score) || 0));

    res.forEach(r => {
      const name  = r.player.trim();
      const score = parseFloat(r.score);
      if (!stats[name] || isNaN(score)) return;

      stats[name].played++;
      // Float-safe addition
      stats[name].points = Math.round((stats[name].points + score) * 100000) / 100000;
      if (score === maxScore) stats[name].wins++;
    });
  });

  return Object.values(stats)
    .map(p => ({
      ...p,
      winRate:  p.played ? Math.round(p.wins  / p.played * 10000) / 100 : 0,
      avgScore: p.played ? Math.round(p.points / p.played * 10000) / 10000 : 0,
    }))
    .sort((a, b) => b.points - a.points || b.winRate - a.winRate);
}

/* ═══════════════════════════════════════════════════════
   RENDER — MAIN LEADERBOARD
═══════════════════════════════════════════════════════ */
function renderLeaderboard(data) {
  const tbody = document.getElementById("lb-body");
  tbody.innerHTML = "";

  data.forEach((p, idx) => {
    const rank = idx + 1;
    const tr   = document.createElement("tr");
    if (rank === 1) tr.classList.add("top-1");
    if (rank === 2) tr.classList.add("top-2");
    if (rank === 3) tr.classList.add("top-3");

    tr.innerHTML = `
      <td><span class="lb-rank">${medal(rank) || rank}</span></td>
      <td>
        <div class="lb-player">
          ${avEl(p.name)}
          <span class="lb-name">${p.name}</span>
        </div>
      </td>
      <td class="r">${p.played}</td>
      <td class="r">${p.wins}</td>
      <td class="r"><span class="lb-pts">${fmtNum(p.points)}</span></td>
      <td class="r"><span class="wr-pill ${wrClass(p.winRate)}">${p.winRate.toFixed(1)}%</span></td>
      <td class="r">${p.avgScore.toFixed(2)}</td>
    `;
    tbody.appendChild(tr);
  });

  // Badge counts
  document.getElementById("lb-count").textContent = `${data.length} ranked`;
  document.getElementById("hd-players").textContent = data.length;
  document.getElementById("hd-matches").textContent = MATCHES.length;

  // Footer summary bar
  const footer   = document.getElementById("lb-footer");
  footer.innerHTML = "";
  const totalPts  = Math.round(data.reduce((s, p) => s + p.points, 0) * 100) / 100;
  const leader    = data[0];
  const bestWR    = data.length ? Math.max(...data.map(p => p.winRate)) : 0;
  const bestWRp   = data.find(p => Math.abs(p.winRate - bestWR) < 0.001);
  const totalGames = data.reduce((s, p) => s + p.played, 0);

  [
    { label: "Total Points",  val: fmtNum(totalPts) },
    { label: "Current Leader",val: leader ? leader.name.split(" ")[0] : "—" },
    { label: "Best Win Rate", val: bestWRp ? `${bestWR.toFixed(1)}%` : "—" },
    { label: "Total Games",   val: totalGames },
    { label: "Matches",       val: MATCHES.length },
  ].forEach(s => {
    const el = document.createElement("div");
    el.className = "lb-fstat";
    el.innerHTML = `<div class="lb-fstat-label">${s.label}</div><div class="lb-fstat-val">${s.val}</div>`;
    footer.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════
   RENDER — MATCH HISTORY
═══════════════════════════════════════════════════════ */
function renderMatches() {
  const grid = document.getElementById("matches-grid");
  grid.innerHTML = "";

  if (!MATCHES.length) {
    grid.innerHTML = `<p style="font-family:var(--ff-mono);font-size:.75rem;color:var(--dust)">No matches in data.js yet.</p>`;
    document.getElementById("match-count").textContent = "0 matches";
    return;
  }

  // Render newest first
  [...MATCHES].reverse().forEach((match, ci) => {
    const sorted = [...match.results]
      .map(r => ({ ...r, score: parseFloat(r.score) || 0 }))
      .sort((a, b) => b.score - a.score);

    const maxScore   = sorted.length ? sorted[0].score : 0;
    const totalScore = Math.round(sorted.reduce((s, r) => s + r.score, 0) * 100) / 100;
    const avgScore   = sorted.length ? Math.round(totalScore / sorted.length * 100) / 100 : 0;

    const rows = sorted.map((r, i) => {
      const mr  = i + 1;
      const cls = mr <= 3 ? `mr-${mr}` : "";
      const isWinner = r.score === maxScore;
      return `
        <tr class="${cls}">
          <td><span class="mt-rank">${medal(mr) || mr}</span></td>
          <td>
            <div class="mt-player">
              ${avEl(r.player, 24, ".6rem")}
              ${r.player}
              ${isWinner ? `<span class="win-badge">WIN</span>` : ""}
            </div>
          </td>
          <td class="r"><span class="mt-score">${fmtNum(r.score)}</span></td>
        </tr>`;
    }).join("");

    const card = document.createElement("div");
    card.className = "match-card";
    card.style.animationDelay = `${ci * 0.05}s`;
    card.innerHTML = `
      <div class="match-head">
        <div class="match-head-left">
          <span class="match-num">${match.id}</span>
          ${sorted[0] ? `<span class="match-winner-chip">🏆 ${sorted[0].player.split(" ")[0]}</span>` : ""}
        </div>
        <span class="match-date">${fmtDate(match.date)}</span>
      </div>
      <table class="match-table">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>Player</th>
            <th class="r">Score</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="match-foot">
        <div class="mf-item"><div class="mf-label">Players</div><div class="mf-val">${sorted.length}</div></div>
        <div class="mf-item"><div class="mf-label">Top Score</div><div class="mf-val">${fmtNum(maxScore)}</div></div>
        <div class="mf-item"><div class="mf-label">Total Pts</div><div class="mf-val">${fmtNum(totalScore)}</div></div>
        <div class="mf-item"><div class="mf-label">Avg Score</div><div class="mf-val">${fmtNum(avgScore)}</div></div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById("match-count").textContent = `${MATCHES.length} matches`;
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
(function init() {
  // Derive date range for season label
  if (MATCHES.length) {
    const dates  = MATCHES.map(m => m.date).sort();
    const first  = fmtDate(dates[0]);
    const last   = fmtDate(dates[dates.length - 1]);
    document.getElementById("season-label").textContent =
      dates.length > 1 ? `${first} – ${last}` : first;
  }

  // Footer timestamp
  document.getElementById("footer-updated").textContent =
    `Last loaded: ${new Date().toLocaleString("en-IN")}`;

  const stats = buildStats();
  renderLeaderboard(stats);
  renderMatches();
})();
</script>
</body>
</html>
