<script>
/* ═══════════════════════════════════════════════════════
   PURE CALCULATION ENGINE
   No APIs, no storage, no forms.
   Reads PLAYERS + MATCHES from data.js, computes everything.
═══════════════════════════════════════════════════════ */

// ── Avatar colour palette (stable hash per name) ──────────
const PALETTE = [
  ["#3b2a1a","#d4a832"],["#0f2a1a","#2d9e6b"],["#1a0f2a","#8b6dd4"],
  ["#2a0f0f","#d44b3b"],["#0f1f2a","#3b8fd4"],["#1a2a0f","#6dbb3b"],
  ["#2a1a0f","#d47a3b"],["#0f2a2a","#3bd4c8"],["#1a0f1a","#c83bd4"],
  ["#0a1a10","#1da86b"],["#1a1a0f","#b8a828"],["#2a0f1a","#d43b8b"],
];
function palFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}

// ── Helpers ───────────────────────────────────────────────
const ini   = n => n.trim().split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
const medal = r => ["","🥇","🥈","🥉"][r] || "";
const fmtDate = iso => {
  try { return new Date(iso + "T00:00:00").toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" }); }
  catch { return iso; }
};
// Smart number formatter: no trailing zeros, locale commas
function fmtNum(n) {
  if (typeof n !== "number" || isNaN(n)) return "—";
  const r = Math.round(n * 10000) / 10000;
  if (Number.isInteger(r)) return r.toLocaleString();
  // show up to 2 decimal places, strip trailing zeros
  return parseFloat(r.toFixed(2)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}
const wrClass = wr => wr >= 65 ? "wr-hi" : wr >= 35 ? "wr-mid" : "wr-lo";

function avEl(name, size = 34, fs = ".72rem") {
  const [bg, fg] = palFor(name);
  return `<div class="${size <= 26 ? "mt-avatar" : "lb-avatar"}" style="background:${bg};color:${fg};font-size:${fs}">${ini(name)}</div>`;
}

// ── Aggregate stats from MATCHES ─────────────────────────
// Wins: player(s) with max score in each match win that match.
// Ties share the win (each tied player gets win += 1).
function buildStats() {
  // Collect all names (roster + any extras in match data)
  const allNames = new Set(PLAYERS);
  MATCHES.forEach(m => m.results.forEach(r => allNames.add(r.player.trim())));

  const stats = {};
  allNames.forEach(name => { stats[name] = { name, played: 0, wins: 0, points: 0 }; });

  MATCHES.forEach(match => {
    const res = match.results;
    if (!res || !res.length) return;

    // Determine winner(s) for this match
    const maxScore = Math.max(...res.map(r => parseFloat(r.score) || 0));

    res.forEach(r => {
      const name  = r.player.trim();
      const score = parseFloat(r.score);
      if (!stats[name] || isNaN(score)) return;

      stats[name].played++;
      // Float-safe addition
      stats[name].points = Math.round((stats[name].points + score) * 100000) / 100000;
      if (score === maxScore) stats[name].wins++;
    });
  });

  return Object.values(stats)
    .map(p => ({
      ...p,
      winRate:  p.played ? Math.round(p.wins  / p.played * 10000) / 100 : 0,
      avgScore: p.played ? Math.round(p.points / p.played * 10000) / 10000 : 0,
    }))
    .sort((a, b) => b.points - a.points || b.winRate - a.winRate);
}

/* ═══════════════════════════════════════════════════════
   RENDER — MAIN LEADERBOARD
═══════════════════════════════════════════════════════ */
function renderLeaderboard(data) {
  const tbody = document.getElementById("lb-body");
  tbody.innerHTML = "";

  data.forEach((p, idx) => {
    const rank = idx + 1;
    const tr   = document.createElement("tr");
    if (rank === 1) tr.classList.add("top-1");
    if (rank === 2) tr.classList.add("top-2");
    if (rank === 3) tr.classList.add("top-3");

    tr.innerHTML = `
      <td><span class="lb-rank">${medal(rank) || rank}</span></td>
      <td>
        <div class="lb-player">
          ${avEl(p.name)}
          <span class="lb-name">${p.name}</span>
        </div>
      </td>
      <td class="r">${p.played}</td>
      <td class="r">${p.wins}</td>
      <td class="r"><span class="lb-pts">${fmtNum(p.points)}</span></td>
      <td class="r"><span class="wr-pill ${wrClass(p.winRate)}">${p.winRate.toFixed(1)}%</span></td>
      <td class="r">${p.avgScore.toFixed(2)}</td>
    `;
    tbody.appendChild(tr);
  });

  // Badge counts
  document.getElementById("lb-count").textContent = `${data.length} ranked`;
  document.getElementById("hd-players").textContent = data.length;
  document.getElementById("hd-matches").textContent = MATCHES.length;

  // Footer summary bar
  const footer   = document.getElementById("lb-footer");
  footer.innerHTML = "";
  const totalPts  = Math.round(data.reduce((s, p) => s + p.points, 0) * 100) / 100;
  const leader    = data[0];
  const bestWR    = data.length ? Math.max(...data.map(p => p.winRate)) : 0;
  const bestWRp   = data.find(p => Math.abs(p.winRate - bestWR) < 0.001);
  const totalGames = data.reduce((s, p) => s + p.played, 0);

  [
    { label: "Total Points",  val: fmtNum(totalPts) },
    { label: "Current Leader",val: leader ? leader.name.split(" ")[0] : "—" },
    { label: "Best Win Rate", val: bestWRp ? `${bestWR.toFixed(1)}%` : "—" },
    { label: "Total Games",   val: totalGames },
    { label: "Matches",       val: MATCHES.length },
  ].forEach(s => {
    const el = document.createElement("div");
    el.className = "lb-fstat";
    el.innerHTML = `<div class="lb-fstat-label">${s.label}</div><div class="lb-fstat-val">${s.val}</div>`;
    footer.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════
   RENDER — MATCH HISTORY
═══════════════════════════════════════════════════════ */
function renderMatches() {
  const grid = document.getElementById("matches-grid");
  grid.innerHTML = "";

  if (!MATCHES.length) {
    grid.innerHTML = `<p style="font-family:var(--ff-mono);font-size:.75rem;color:var(--dust)">No matches in data.js yet.</p>`;
    document.getElementById("match-count").textContent = "0 matches";
    return;
  }

  // Render newest first
  [...MATCHES].reverse().forEach((match, ci) => {
    const sorted = [...match.results]
      .map(r => ({ ...r, score: parseFloat(r.score) || 0 }))
      .sort((a, b) => b.score - a.score);

    const maxScore   = sorted.length ? sorted[0].score : 0;
    const totalScore = Math.round(sorted.reduce((s, r) => s + r.score, 0) * 100) / 100;
    const avgScore   = sorted.length ? Math.round(totalScore / sorted.length * 100) / 100 : 0;

    const rows = sorted.map((r, i) => {
      const mr  = i + 1;
      const cls = mr <= 3 ? `mr-${mr}` : "";
      const isWinner = r.score === maxScore;
      return `
        <tr class="${cls}">
          <td><span class="mt-rank">${medal(mr) || mr}</span></td>
          <td>
            <div class="mt-player">
              ${avEl(r.player, 24, ".6rem")}
              ${r.player}
              ${isWinner ? `<span class="win-badge">WIN</span>` : ""}
            </div>
          </td>
          <td class="r"><span class="mt-score">${fmtNum(r.score)}</span></td>
        </tr>`;
    }).join("");

    const card = document.createElement("div");
    card.className = "match-card";
    card.style.animationDelay = `${ci * 0.05}s`;
    card.innerHTML = `
      <div class="match-head">
        <div class="match-head-left">
          <span class="match-num">${match.id}</span>
          ${sorted[0] ? `<span class="match-winner-chip">🏆 ${sorted[0].player.split(" ")[0]}</span>` : ""}
        </div>
        <span class="match-date">${fmtDate(match.date)}</span>
      </div>
      <table class="match-table">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>Player</th>
            <th class="r">Score</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="match-foot">
        <div class="mf-item"><div class="mf-label">Players</div><div class="mf-val">${sorted.length}</div></div>
        <div class="mf-item"><div class="mf-label">Top Score</div><div class="mf-val">${fmtNum(maxScore)}</div></div>
        <div class="mf-item"><div class="mf-label">Total Pts</div><div class="mf-val">${fmtNum(totalScore)}</div></div>
        <div class="mf-item"><div class="mf-label">Avg Score</div><div class="mf-val">${fmtNum(avgScore)}</div></div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById("match-count").textContent = `${MATCHES.length} matches`;
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
(function init() {
  // Derive date range for season label
  if (MATCHES.length) {
    const dates  = MATCHES.map(m => m.date).sort();
    const first  = fmtDate(dates[0]);
    const last   = fmtDate(dates[dates.length - 1]);
    document.getElementById("season-label").textContent =
      dates.length > 1 ? `${first} – ${last}` : first;
  }

  // Footer timestamp
  document.getElementById("footer-updated").textContent =
    `Last loaded: ${new Date().toLocaleString("en-IN")}`;

  const stats = buildStats();
  renderLeaderboard(stats);
  renderMatches();
})();
</script>
</body>
</html>
